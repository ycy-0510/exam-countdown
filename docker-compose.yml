services:
  exam-countdown:
    image: ghcr.io/ycy-0510/exam-countdown:latest
    container_name: exam-countdown
    restart: unless-stopped
    ports:
      - 8000:8000
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Taipei
    env_file:
      - .env
    volumes:
      - ./useruploads:/app/src/assets/useruploads
      - ./data:/app/data
