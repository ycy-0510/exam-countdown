{% extends "base.html" %}
{% block title %}Configuration | Exam Countdown{% endblock %}

{% block content %}
<div class="mb-5">
    <h1 class="text-xl font-semibold text-sky-400 tracking-tight">Configuration</h1>
    <p class="text-sm text-zinc-500 mt-0.5">Saved to the database and applied immediately.</p>
</div>

<form method="post" class="bg-zinc-900 rounded-lg border border-zinc-800 p-5 space-y-4">
    {% for field_name, field_label, field_type in fields %}
    <div>
        <label for="{{ field_name }}" class="block text-xs font-medium text-zinc-400 mb-1.5 uppercase tracking-wider">
            {{ field_label }}
            {% if field_type == 'password' %}
            <span class="ml-1 text-zinc-600 normal-case font-normal">· hidden</span>
            {% endif %}
        </label>
        <input type="{{ field_type }}" id="{{ field_name }}" name="{{ field_name }}"
            value="{{ values.get(field_name, '') }}" autocomplete="off" class="block w-full rounded-md bg-zinc-950 border border-zinc-800 text-zinc-100 px-3 py-1.5 text-sm
                   placeholder:text-zinc-600
                   focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 focus:outline-none
                   transition">
    </div>
    {% endfor %}

    <div class="pt-3 border-t border-zinc-800">
        <button type="submit" class="inline-flex items-center px-3 py-1.5 rounded-md bg-sky-500/10 text-sky-300 ring-1 ring-sky-500/20 text-sm font-medium
                   hover:bg-sky-500/15 hover:text-sky-200 focus:outline-none focus:ring-2 focus:ring-sky-500/40
                   transition">
            Save Configuration
        </button>
    </div>
</form>
{% endblock %}
